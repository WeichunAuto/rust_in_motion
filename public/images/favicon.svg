<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 圆形背景 -->
  <circle cx="16" cy="16" r="16" fill="#0088CC"/>

  <!-- 天线杆 -->
  <rect x="15" y="2" width="2" height="5" rx="1" fill="#E8F4FF"/>
  <!-- 天线顶端圆点 -->
  <circle cx="16" cy="2.5" r="2" fill="#E8F4FF"/>

  <!-- 机器人头部外框 -->
  <rect x="5" y="8" width="22" height="17" rx="4" fill="#006FA8" stroke="#E8F4FF" stroke-width="1.5"/>

  <!-- 左眼外圈（齿轮感） -->
  <circle cx="11" cy="16" r="4" fill="#E8F4FF"/>
  <circle cx="11" cy="16" r="2.2" fill="#0088CC"/>
  <circle cx="11" cy="16" r="1" fill="#E8F4FF"/>

  <!-- 右眼外圈 -->
  <circle cx="21" cy="16" r="4" fill="#E8F4FF"/>
  <circle cx="21" cy="16" r="2.2" fill="#0088CC"/>
  <circle cx="21" cy="16" r="1" fill="#E8F4FF"/>

  <!-- 嘴巴（像素格子风） -->
  <rect x="10" y="21" width="2" height="2" rx="0.5" fill="#E8F4FF"/>
  <rect x="13" y="22" width="2" height="1.5" rx="0.5" fill="#E8F4FF"/>
  <rect x="16" y="22" width="2" height="1.5" rx="0.5" fill="#E8F4FF"/>
  <rect x="19" y="21" width="2" height="2" rx="0.5" fill="#E8F4FF"/>

  <!-- 耳朵/侧面螺丝 -->
  <rect x="2" y="13" width="3" height="5" rx="1.5" fill="#E8F4FF"/>
  <rect x="27" y="13" width="3" height="5" rx="1.5" fill="#E8F4FF"/>
</svg>
