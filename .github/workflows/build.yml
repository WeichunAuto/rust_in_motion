name: Build and Deploy

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch: # 添加手动触发

permissions:
  contents: write

# 添加并发控制，避免多个任务同时运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 验证系统架构
      - name: Verify system architecture
        run: |
          echo "System architecture:"
          uname -m
          arch

      # 安装 Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: cargo, rustfmt, clippy
          target: x86_64-unknown-linux-gnu

      # 添加 WASM 目标（Leptos 必需）
      - name: Add WASM target
        run: |
          rustup target add wasm32-unknown-unknown
          rustup target list | grep installed
          # 验证安装
          rustc --print target-list | grep wasm32

      # 安装依赖
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            build-essential \
            curl \
            nodejs \
            npm \
            ca-certificates \
            gcc \
            g++ \
            make  

            # 手动安装最新版本的 binaryen
          cd /tmp
          wget https://github.com/WebAssembly/binaryen/releases/download/version_120/binaryen-version_120-x86_64-linux.tar.gz
          tar -xzf binaryen-version_120-x86_64-linux.tar.gz
          sudo cp binaryen-version_120/bin/* /usr/local/bin/
          wasm-opt --version
            
            
          # 验证编译器架构
          gcc -dumpmachine

      # 安装 cargo-leptos 和 sqlx-cli
      - name: Install cargo-leptos and sqlx-cli
        run: |
          # 检查并安装 cargo-leptos
          if ! command -v cargo-leptos &> /dev/null; then
            cargo install cargo-leptos --locked --target x86_64-unknown-linux-gnu
          fi
          # 检查并安装 sqlx-cli
          if ! command -v sqlx &> /dev/null; then
            cargo install sqlx-cli --locked --target x86_64-unknown-linux-gnu
          fi
          cargo --version
          sqlx --version

          # 验证安装的二进制文件架构
          file ~/.cargo/bin/cargo-leptos | grep x86-64
          file ~/.cargo/bin/sqlx | grep x86-64

      # 缓存 Node.js 依赖
      - name: Cache Node.js dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-x86_64-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-node-

      # 安装前端依赖
      - name: Install frontend dependencies
        run: |
          npm ci
          npm install tw-animate-css

          # 验证 Node.js 架构
          node -p "process.arch"
          # 应该输出 x64

      # 设置 Rust 目标架构（确保编译为 x86_64）
      - name: Configure Rust target
        run: |
          rustup target add x86_64-unknown-linux-gnu
          rustup show

          # 显示 Rust 目标
          rustup show
          rustc --version
          cargo --version
          cargo leptos --version

      # 在构建步骤之前添加设置环境变量的步骤
      # 设置生产环境变量
      - name: Set production environment
        run: |
          echo "RUN_ENV=prod" >> $GITHUB_ENV
          echo "RUST_LOG=info" >> $GITHUB_ENV
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
          echo "Building for production environment"

      # 构建 leptos
      - name: Build leptos
        run: cargo leptos build --release

      # 添加调试步骤：查看构建产物
      - name: Debug build artifacts
        run: |
          echo "========================================"
          echo "Checking build artifacts in CI"
          echo "========================================"

          # 查看当前目录
          echo "Current directory: $(pwd)"
          echo ""

          # 查看 target/release 目录
          echo "Contents of target/release:"
          if [ -d "target/release" ]; then
            ls -la target/release/
            echo ""
            echo "Looking for rust_in_motion binary:"
            find target/release -name "rust_in_motion" -type f 2>/dev/null || echo "Not found"
          else
            echo "target/release directory does not exist!"
          fi
          echo ""

          # 查看 target/site 目录
          echo "Contents of target/site:"
          if [ -d "target/site" ]; then
            ls -la target/site/
          else
            echo "target/site directory does not exist!"
          fi
          echo ""

          # 查看 migrations 目录
          echo "Contents of migrations:"
          if [ -d "migrations" ]; then
            ls -la migrations/
          else
            echo "migrations directory does not exist!"
          fi
          echo ""

          # 查看 config 目录
          echo "Contents of config:"
          if [ -d "config" ]; then
            ls -la config/
          else
            echo "config directory does not exist!"
          fi
          echo ""

          # 查找所有可能的构建产物
          echo "Searching for rust_in_motion binary in target:"
          find target -name "rust_in_motion" -type f 2>/dev/null || echo "Not found"
          echo ""

          echo "Searching for site directory:"
          find target -name "site" -type d 2>/dev/null || echo "Not found"
          echo "========================================"

      # 上传到服务器
      - name: Upload files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: "target/release/rust_in_motion,target/site,migrations,config"
          target: /home/ubuntu/app
          strip_components: 0
          overwrite: true
          timeout: 30s
          command_timeout: 10m

      # 重启服务器中的rust_in_motion服务
      - name: Restart rust_in_motion service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            # 安全开关，只要有一条命令失败，脚本立即退出
            set -e

            echo "Restarting rust_in_motion service..."

            # 重新加载 systemd（防止 service 文件有变化）
            sudo systemctl daemon-reexec
            sudo systemctl daemon-reload

            # 重启服务
            sudo systemctl restart rust_in_motion

            # 查看状态（调试用）
            sudo systemctl status rust_in_motion --no-pager

            echo "Service restarted successfully!"
