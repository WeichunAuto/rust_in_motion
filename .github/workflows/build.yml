name: Build and Deploy

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch: # 添加手动触发

permissions:
  contents: write

# 添加并发控制，避免多个任务同时运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 验证系统架构
      - name: Verify system architecture
        run: |
          echo "System architecture:"
          uname -m
          arch

      # 安装 Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: cargo, rustfmt, clippy
          target: x86_64-unknown-linux-gnu

      # 添加 WASM 目标（Leptos 必需）
      - name: Add WASM target
        run: |
          rustup target add wasm32-unknown-unknown
          rustup target list | grep installed
          # 验证安装
          rustc --print target-list | grep wasm32

      # 安装依赖
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            build-essential \
            curl \
            nodejs \
            npm \
            ca-certificates \
            gcc \
            g++ \
            make \
            binaryen  # 添加 binaryen 用于 WASM 优化
            
          # 验证编译器架构
          gcc -dumpmachine

      # 安装 cargo-leptos 和 sqlx-cli
      - name: Install cargo-leptos and sqlx-cli
        run: |
          # 检查并安装 cargo-leptos
          if ! command -v cargo-leptos &> /dev/null; then
            cargo install cargo-leptos --locked --target x86_64-unknown-linux-gnu
          fi
          # 检查并安装 sqlx-cli
          if ! command -v sqlx &> /dev/null; then
            cargo install sqlx-cli --locked --target x86_64-unknown-linux-gnu
          fi
          cargo --version
          sqlx --version

          # 验证安装的二进制文件架构
          file ~/.cargo/bin/cargo-leptos | grep x86-64
          file ~/.cargo/bin/sqlx | grep x86-64

      # 缓存 Node.js 依赖
      - name: Cache Node.js dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-x86_64-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-node-

      # 安装前端依赖
      - name: Install frontend dependencies
        run: |
          npm ci
          npm install tw-animate-css

          # 验证 Node.js 架构
          node -p "process.arch"
          # 应该输出 x64

      # 设置 Rust 目标架构（确保编译为 x86_64）
      - name: Configure Rust target
        run: |
          rustup target add x86_64-unknown-linux-gnu
          rustup show

          # 显示 Rust 目标
          rustup show
          rustc --version
          cargo --version
          cargo leptos --version

      # 构建 leptos
      - name: Build leptos
        run: cargo leptos build --release

      # 上传到服务器
      - name: Upload files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: |
            target/release/rust_in_motion
            target/site
            migrations
            config
          target: /home/ubuntu/app

      # 重启服务
      # - name: Restart app
      #   uses: appleboy/ssh-action@v1.0.0
      #   with:
      #     host: ${{ secrets.SERVER_HOST }}
      #     username: ${{ secrets.SERVER_USER }}
      #     key: ${{ secrets.SERVER_SSH_KEY }}
